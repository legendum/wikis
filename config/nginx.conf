# wikis.fyi — Nginx site configuration
# Copy to /etc/nginx/sites-available/wikis.fyi
# Then: ln -s /etc/nginx/sites-available/wikis.fyi /etc/nginx/sites-enabled/

# Redirect HTTP → HTTPS and www → bare domain
server {
    listen 80;
    listen [::]:80;
    server_name wikis.fyi www.wikis.fyi;
    return 301 https://wikis.fyi$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wikis.fyi www.wikis.fyi;

    # TLS (Let's Encrypt / certbot)
    ssl_certificate /etc/letsencrypt/live/wikis.fyi/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wikis.fyi/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Redirect www to bare domain
    if ($host = www.wikis.fyi) {
        return 301 https://wikis.fyi$request_uri;
    }

    # Proxy to Bun server
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Sync and source push can send large payloads
        client_max_body_size 50m;
    }

    # SSE — disable buffering so events stream immediately
    location ~ ^/api/events/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;         # keep SSE connections open for up to 24h
    }

    # Static assets — serve directly, bypass Bun
    location /public/ {
        alias /opt/wikis/public/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Health check (for monitoring / load balancers)
    location = /health {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }
}
